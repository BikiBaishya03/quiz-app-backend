spring.application.name=Quiz

spring.jpa.hibernate.ddl-auto=update
#spring.datasource.url=jdbc:mysql://localhost:3306/quiz
#spring.datasource.username=root
#spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.show-sql =  true

spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.MySQL8Dialect

server.port=${PORT:8080}

# It looks for an environment variable called FRONTEND_URL
# If it doesn't find one, it defaults to http://127.0.0.1:5500

app.frontend.url=${FRONTEND_URL:http://127.0.0.1:5500}

# Database example
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}